<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameDrop — RAW Photo Ingestion</title>
    <meta name="description" content="Automatic RAW photo ingestion tool. Detects SD cards, copies files organized by date and camera brand." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body class="h-screen w-screen flex flex-col overflow-hidden" style="font-family:'Inter',system-ui,sans-serif;background:#1a1a1a;color:#f5f5f5">
    
    <!-- ─── Titlebar ────────────────────────────────────────────── -->
    <div id="titlebar" data-tauri-drag-region class="flex items-center justify-between h-[34px] bg-[#1e1e1e] border-bottom border-[#2d2d2d] flex-shrink-0 z-[9999] select-none">
      <div class="flex items-center gap-2.5 px-3 pointer-events-none">
        <i data-lucide="camera" class="w-4 h-4 text-teal-500/80"></i>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">FrameDrop</span>
      </div>
      <div class="flex items-center h-full">
        <div id="titlebar-minimize" class="titlebar-button hover:bg-[#2d2d2d]">
          <i data-lucide="minus" class="w-3.5 h-3.5"></i>
        </div>
        <div id="titlebar-maximize" class="titlebar-button hover:bg-[#2d2d2d]">
          <i data-lucide="square" class="w-3 h-3"></i>
        </div>
        <div id="titlebar-close" class="titlebar-button hover:bg-[#c42b1c] hover:text-white">
          <i data-lucide="x" class="w-3.5 h-3.5"></i>
        </div>
      </div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden">

    <!-- ─── Sidebar ──────────────────────────────────────────────── -->
    <nav id="sidebar" style="width:220px;background:#1e1e1e;border-right:1px solid #2d2d2d;display:flex;flex-direction:column;justify-content:space-between;padding:20px 12px;flex-shrink:0">
      <div>
        <!-- Logo -->
        <div style="display:flex;align-items:center;gap:14px;padding:4px 8px;margin-bottom:40px">
          <div style="width:40px;height:40px;border-radius:12px;background:rgba(20, 184, 166, 0.1);display:flex;align-items:center;justify-content:center;border:1px solid rgba(20, 184, 166, 0.2)">
             <i data-lucide="camera" style="width:22px;height:22px;color:#14b8a6;flex-shrink:0"></i>
          </div>
          <span style="font-size:19px;font-weight:700;letter-spacing:-0.4px;color:#f5f5f5">FrameDrop</span>
        </div>

        <!-- Nav links -->
        <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px">
          <li>
            <a href="#" id="nav-dashboard" class="nav-link active-nav"
               style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;text-decoration:none;font-size:13.5px;font-weight:500;color:#f5f5f5;background:#2d2d2d;transition:background 0.15s">
              <i data-lucide="layout-dashboard" style="width:16px;height:16px;color:#14b8a6;flex-shrink:0"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a href="#" id="nav-history" class="nav-link"
               style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;text-decoration:none;font-size:13.5px;font-weight:500;color:#888;transition:background 0.15s">
              <i data-lucide="clock" style="width:16px;height:16px;flex-shrink:0"></i>
              History
            </a>
          </li>
        </ul>
      </div>

      <!-- Settings at bottom -->
      <a href="#" id="nav-settings" class="nav-link"
         style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;text-decoration:none;font-size:13.5px;font-weight:500;color:#888;transition:background 0.15s">
        <i data-lucide="settings" style="width:16px;height:16px;flex-shrink:0"></i>
        Settings
      </a>
    </nav>

    <!-- ─── Main ─────────────────────────────────────────────────── -->
    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#1a1a1a">

      <!-- Topbar -->
      <header style="height:52px;border-bottom:1px solid #2d2d2d;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;background:#1e1e1e">
        <h2 id="page-title" style="margin:0;font-size:15px;font-weight:600;color:#f5f5f5">Dashboard</h2>
        <!-- Status pill -->
        <div style="display:flex;align-items:center;gap:8px;background:#252525;border:1px solid #333;padding:5px 12px;border-radius:20px">
          <div style="position:relative;width:10px;height:10px;flex-shrink:0">
            <span id="status-pulse" style="position:absolute;inset:0;border-radius:50%;background:#14b8a6;opacity:0;animation:none"></span>
            <span id="status-dot"   style="position:absolute;inset:0;border-radius:50%;background:#555"></span>
          </div>
          <span id="status-text" style="font-size:12.5px;font-weight:500;color:#aaa">Idle</span>
        </div>
      </header>

      <!-- Content -->
      <div id="view-container" style="flex:1;overflow-y:auto;padding:24px 28px;position:relative"></div>
    </main>

    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>

    <script type="module" src="./main.js"></script>

    <style>
      .nav-link:hover { background: #252525 !important; color: #ddd !important; }
      .nav-link:hover i { color: #14b8a6; }
    </style>
  </body>
</html>
