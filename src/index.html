<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameDrop — RAW Photo Ingestion</title>
    <meta name="description" content="Automatic RAW photo ingestion tool. Detects SD cards, copies files organized by date and camera brand." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body class="h-screen w-screen flex flex-col overflow-hidden" style="font-family:'Inter',system-ui,sans-serif;background:#1a1a1a;color:#f5f5f5">
    
    <!-- ─── Titlebar ────────────────────────────────────────────── -->
    <div id="titlebar" data-tauri-drag-region class="flex items-center justify-between h-[34px] bg-[#1e1e1e] border-bottom border-[#2d2d2d] flex-shrink-0 z-[9999] select-none">
      <div class="flex items-center gap-2.5 px-3 pointer-events-none">
        <svg class="w-3.5 h-3.5 text-teal-500/80" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="120" y="280" width="784" height="520" rx="100" stroke="currentColor" stroke-width="80"/>
          <circle cx="512" cy="540" r="180" stroke="currentColor" stroke-width="80"/>
          <circle cx="512" cy="540" r="60" fill="currentColor"/>
          <path d="M360 280V200C360 160 390 130 430 130H594C634 130 664 160 664 200V280" stroke="currentColor" stroke-width="80" stroke-linecap="round"/>
        </svg>
        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">FrameDrop</span>
      </div>
      <div class="flex items-center h-full">
        <div id="titlebar-minimize" class="titlebar-button hover:bg-[#2d2d2d]">
          <i data-lucide="minus" class="w-3.5 h-3.5"></i>
        </div>
        <div id="titlebar-maximize" class="titlebar-button hover:bg-[#2d2d2d]">
          <i data-lucide="square" class="w-3 h-3"></i>
        </div>
        <div id="titlebar-close" class="titlebar-button hover:bg-[#c42b1c] hover:text-white">
          <i data-lucide="x" class="w-3.5 h-3.5"></i>
        </div>
      </div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar -->
    <nav id="app-sidebar" class="sidebar"></nav>

    <!-- ─── Main ─────────────────────────────────────────────────── -->
    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#1a1a1a">

      <!-- Topbar -->
      <header style="height:52px;border-bottom:1px solid #2d2d2d;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;background:#1e1e1e">
        <h2 id="page-title" style="margin:0;font-size:15px;font-weight:600;color:#f5f5f5">Dashboard</h2>
        <!-- Status pill -->
        <div style="display:flex;align-items:center;gap:8px;background:#252525;border:1px solid #333;padding:5px 12px;border-radius:20px">
          <div style="position:relative;width:10px;height:10px;flex-shrink:0">
            <span id="status-pulse" style="position:absolute;inset:0;border-radius:50%;background:#14b8a6;opacity:0;animation:none"></span>
            <span id="status-dot"   style="position:absolute;inset:0;border-radius:50%;background:#555"></span>
          </div>
          <span id="status-text" style="font-size:12.5px;font-weight:500;color:#aaa">Idle</span>
        </div>
      </header>

      <!-- Content -->
      <div id="view-container" style="flex:1;overflow-y:auto;padding:24px 28px;position:relative"></div>
    </main>

    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>

    <script type="module" src="./main.js"></script>

    <style>
      .nav-link:hover { background: #252525 !important; color: #ddd !important; }
      .nav-link:hover i { color: #14b8a6; }
    </style>
  </body>
</html>
